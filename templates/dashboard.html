{% extends "layout.html" %}

{% block content %}
<main class="grid grid-cols-1 lg:grid-cols-4 gap-8">
    
    <section class="lg:col-span-1 glass p-6 rounded-3xl h-fit lg:sticky lg:top-8 z-20 mb-8 lg:mb-0">
        <h2 class="text-xl font-bold mb-6 text-indigo-400">Log Observation</h2>
        <form hx-post="/add-target" 
        hx-target="#target-list" 
        hx-swap="afterbegin"
        hx-on::after-request="if(event.detail.successful) { 
                                 this.reset(); 
                                 document.getElementById('form-error').innerText = ''; 
                              }"
        hx-on::response-error="document.getElementById('form-error').innerText = event.detail.xhr.responseText"
        class="space-y-4">
  
      <div id="form-error" class="text-red-400 text-sm font-bold min-h-[1.25rem]"></div>

            <input name="name" placeholder="Object (e.g. Andromeda)" required class="w-full bg-white/5 p-4 rounded-xl border border-white/10 focus:ring-2 focus:ring-indigo-500 outline-none">
            <input name="ra" placeholder="Right Ascension" required class="coord-mask w-full bg-white/5 p-4 rounded-xl border border-white/10 focus:ring-2 focus:ring-indigo-500 outline-none">
            <input name="dec" placeholder="Declination" required class="dec-mask w-full bg-white/5 p-4 rounded-xl border border-white/10 focus:ring-2 focus:ring-indigo-500 outline-none">
            <textarea name="notes" placeholder="Notes (Optional)..." rows="3" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none"></textarea>
            <button class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all shadow-lg shadow-indigo-500/20">LOG OBJECT</button>
        </form>
    </section>

    <section class="lg:col-span-3">
        
        <div id="target-list">
            {% for target in targets %}
                {% include 'fragments/target_row.html' %}
            {% endfor %}
            
            <div id="infinite-scroll-sentinel" 
                 hx-get="/load-more?page=1" 
                 hx-trigger="revealed" 
                 hx-target="#infinite-scroll-sentinel" 
                 hx-swap="outerHTML" 
                 class="flex justify-center p-8">
            </div>
        </div>
    </section>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='coords.js') }}"></script>
{% endblock %}
