<div id="observation-{{ target.id }}" 
     class="glass group rounded-2xl border border-white/5 mb-4 overflow-hidden transition-all duration-300">
    
    <div class="p-5 flex items-center justify-between cursor-pointer active:bg-white/5" 
         onclick="const content = this.nextElementSibling; 
                  content.classList.toggle('is-open');">
        
        <div class="flex flex-col">
            <span class="text-indigo-400 font-semibold text-lg tracking-tight group-hover:text-indigo-300 transition-colors">
                {{ target.target_name }}
            </span>
            <span class="text-slate-600 text-[10px] font-mono uppercase tracking-[0.2em] mt-0.5">
                {{ target.created_at }}
            </span>
        </div>

        <div class="flex gap-6 items-center">
            <div class="hidden md:flex flex-col items-end text-right opacity-40">
                <span class="text-[8px] uppercase tracking-[0.3em] text-slate-500 mb-1">Position</span>
                <span class="font-mono text-[11px] text-slate-400 italic">
                    {{ target.ra }} / {{ target.declination }}
                </span>
            </div>
            
            <button type="button"
                    hx-delete="/delete-target/{{ target.id }}"
                    hx-target="#observation-{{ target.id }}"
                    hx-swap="outerHTML swap:400ms"
                    hx-trigger="confirmed"
                    hx-on:click="
                        Swal.fire({
                            title: 'Confirm Deletion',
                            text: 'Remove {{ target.target_name }} from logs?',
                            icon: 'warning',
                            showCancelButton: true,
                            confirmButtonColor: '#4f46e5', /* Indigo-600 */
                            cancelButtonColor: '#1e293b',  /* Slate-800 */
                            confirmButtonText: 'Delete',
                            background: '#0f172a',        /* Match your glass theme */
                            color: '#f1f5f9'
                        }).then((result) => {
                            if (result.isConfirmed) {
                                htmx.trigger(this, 'confirmed');
                            }
                        })
                    "
                    class="p-2 text-slate-700 hover:text-red-500 transition-colors"
                    onclick="event.stopPropagation()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </div>

    <div class="expandable-content no-blur-mobile border-t border-white/5 rounded-b-2xl">
        <div class="px-6 py-5">
            <div class="md:hidden grid grid-cols-2 gap-4 mb-4 pb-4 border-b border-white/5">
                <div class="flex flex-col">
                    <span class="text-[8px] uppercase text-slate-500">RA</span>
                    <span class="font-mono text-sm text-indigo-300">{{ target.ra }}</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[8px] uppercase text-slate-500">DEC</span>
                    <span class="font-mono text-sm text-indigo-300">{{ target.declination }}</span>
                </div>
            </div>

            <span class="text-[8px] uppercase tracking-[0.3em] text-slate-500 block mb-2">Observer Notes</span>
            <p class="text-slate-400 text-sm font-light italic leading-relaxed">
                {% if target.notes and target.notes.strip() %}
                    "{{ target.notes }}"
                {% else %}
                    <span class="text-slate-700 italic">No notes.</span>
                {% endif %}
            </p>
        </div>
    </div>
</div>
