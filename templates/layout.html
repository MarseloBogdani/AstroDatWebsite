<!DOCTYPE html>
<html lang="el" class="dark" translate="no" style="color-scheme: dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>AstroDat Observer Pro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        // Επιβολή στην Tailwind να χρησιμοποιεί την κλάση .dark που βάλαμε στο html tag
        tailwind.config = {
            darkMode: 'selector',
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617' },
                        astro: { 
                            accent: '#4da6ff',
                            bg: '#020617'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="loading min-h-screen p-4 md:p-12 relative"> 
    <div id="intro-loader" aria-hidden="true">
        <div class="logo-wrap" id="logo">
            <span>ASTRO</span><span class="dat">DAT</span><span class="pro">PRO</span>
        </div>
    </div>
    <div id="main-wrapper" class="max-w-6xl mx-auto relative z-10">
            <header class="flex flex-col md:flex-row items-center justify-between gap-8 mb-16">
                <div class="flex-shrink-0">
                    <h1 class="text-3xl font-light tracking-[0.2em] text-white">
                        ASTRO<span class="text-indigo-500 font-semibold">DAT</span>PRO
                    </h1>
                    <p class="text-[10px] text-slate-500 tracking-[0.3em] uppercase">Deep Sky Observation Log</p>
                </div>
            
                <div class="flex-1 max-w-xl w-full relative group">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500 group-focus-within:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="search" 
                        name="q" 
                        placeholder="Search database..." 
                        class="w-full bg-white/5 border border-white/10 p-3 pl-12 rounded-full text-sm font-light outline-none focus:border-indigo-500/50 focus:bg-white/[0.07] transition-all"
                        hx-get="/search" 
                        hx-trigger="keyup changed delay:500ms, search" 
                        hx-target="#target-list" 
                        hx-indicator="#search-spinner">
                    
                    <div id="search-spinner" class="htmx-indicator absolute right-4 top-3">
                        <div class="w-4 h-4 border-2 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
                    </div>
                </div>
            
                <div class="flex flex-col items-end gap-1">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                        <span class="font-mono text-[10px] tracking-widest text-slate-400">SYSTEM LIVE</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[9px] text-slate-600 uppercase tracking-widest">Records</span>
                        <span class="text-xl font-mono font-light text-indigo-400">
                            {{ total_count | compact_number }}
                        </span>
                    </div>
                </div>
            </header>

            {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='intro.js') }}"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
